name: 13 - Using Caching

on:
  workflow_dispatch:
    inputs:
      use_cache:
        type: boolean
        default: true
        description: Set to false to disable caching
      node-version:
        description: Specify the Node.js version to use
        type: choice
        options:
              - '18.x'
              - '20.x'
              - '22.x'
        default: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching/react-app


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download cached dependencies
        uses: actions/cache@v3
        if: ${{inputs.use_cache}}
        id: cache
        with:
          path: 13-caching/react-app/node_modules
          key: deps-node-modules-${{ hashfiles('13-caching/react-app/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Testing
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to nonprod
        run: echo "Deploying to nonprod..."




    # DONE 1. Checkout the code
    # DONE 2. Install dependencies
    # DONE 3. unit testing, building
    # DONE 4. Deploy to a nonprod environment

