name: 09 - Using Functions

on:
  push:
  workflow_dispatch:


jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: |
          echo "I will fail"
          exit 1

      - name: I will be skipped
        run: |
          "I will print if previous steps succeeded."

      - name: I will execute
        if: exit == 1
        run: |
            echo "I will print if previous steps failed."

      - name: I will execute
        if: always()
        run: |
            echo "I will always print, except when the workflow is cancelled."

      - name: I will execute when cancelled
        if: cancelled()
        run: |
            echo "I will print if the workflow is cancelled."
          
