name: 08 - Using Variables
on:
  push:
  workflow_dispatch:

env:
  MY_WORKFLOW_VAR: 'I am workflow env var'
  MY_OVERWRITTEN_VAR: 'I will be overwritten'

jobs:
  echo:
    runs-on: ubuntu-latest
    env:
        JOV_VAR: 'I am job env var'
        OVERWRITTEN: 'I have been overwritten at the job level'
    steps:
        - name: Print Env Variables
          env:
              STEP_VAR: 'I am step env var'
              step_var2: 'I am another step env var'
          run: |
              echo "Step env var: ${{ env.STEP_VAR }}"
              echo "Step env var 2: ${{ env.step_var2 }}"
              echo "Job env var: ${{ env.JOV_VAR }}"
              echo "Workflow env var: ${{ env.MY_WORKFLOW_VAR }}"
              echo "Overwritten var: ${{ env.OVERWRITTEN }}"
        - name: Overwrite job variable
          env:
            OVERWRITTEN: 'I have been overwritten at the step level'
          run: |
              echo "Overwritten var: ${{ env.OVERWRITTEN }}"